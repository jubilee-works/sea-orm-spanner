name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump versions
        run: ./scripts/bump-version.sh ${{ inputs.bump }}

      - name: Read new version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release notes template
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p releases
          cat > "releases/v${VERSION}.md" << 'TEMPLATE'
          Write release notes here before merging.
          TEMPLATE
          sed -i 's/^          //' "releases/v${VERSION}.md"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Verify root workspace
        run: cargo check --all-features
      - name: Verify sea-orm-migration-spanner
        run: cargo check --all-features
        working-directory: sea-orm-migration-spanner

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/v${{ steps.version.outputs.version }}
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          title: "🚀 Release v${{ steps.version.outputs.version }}"
          body: |
            ## Release v${{ steps.version.outputs.version }}

            **Before merging**, edit `releases/v${{ steps.version.outputs.version }}.md` with release notes.
            The contents will be used as the GitHub Release body and git tag annotation.

            ### Crates
            - `sea-query-spanner` → ${{ steps.version.outputs.version }}
            - `sea-orm-spanner` → ${{ steps.version.outputs.version }}
            - `sea-orm-migration-spanner` → ${{ steps.version.outputs.version }}
