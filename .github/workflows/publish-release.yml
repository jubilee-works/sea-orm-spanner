name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="releases/v${VERSION}.md"
          if [[ ! -f "$NOTES_FILE" ]]; then
            echo "::error::Release notes not found: $NOTES_FILE"
            exit 1
          fi
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat "$NOTES_FILE"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "releases/v${VERSION}.md"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_with_retry() {
            local max_attempts=10
            local delay=15
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $*"
              if "$@" 2>&1; then
                return 0
              fi
              if [[ $attempt -lt $max_attempts ]]; then
                echo "Retrying in ${delay}s..."
                sleep $delay
                delay=$((delay + 15))
              fi
            done
            echo "::error::Failed after $max_attempts attempts: $*"
            return 1
          }

          cargo publish -p sea-query-spanner
          publish_with_retry cargo publish
          publish_with_retry cargo publish --manifest-path sea-orm-migration-spanner/Cargo.toml
