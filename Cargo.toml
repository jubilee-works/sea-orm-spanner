[workspace]
resolver = "2"
members = [
    "sea-query-spanner",
    "sea-orm-spanner",
    "sea-orm-migration-spanner",
    "examples/basic-crud",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"
repository = "https://github.com/user/sea-orm-spanner"
keywords = ["spanner", "sea-orm", "orm", "database", "google-cloud"]
categories = ["database"]

[workspace.dependencies]
# Core
sea-orm = { version = "1.1", default-features = false }
sea-query = { version = "0.32", default-features = false }

# Spanner
google-cloud-spanner = "0.12"

# Async
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Types
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
rust_decimal = { version = "1", features = ["serde"] }

# Error handling
thiserror = "2"

# Logging
tracing = "0.1"

# Testing
tokio-test = "0.4"
