[package]
name = "sea-orm-migration-spanner"
version = "0.1.0"
edition = "2021"
description = "Sea-ORM migration support for Google Cloud Spanner"
license = "MIT OR Apache-2.0"

[dependencies]
sea-orm = { version = "1.1", features = ["runtime-tokio-native-tls", "macros"] }
sea-orm-spanner = { path = "../sea-orm-spanner" }
sea-query-spanner = { path = "../sea-query-spanner" }
google-cloud-spanner = "0.12"
google-cloud-googleapis = { version = "0.6.0", features = ["spanner"] }
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
chrono = "0.4"
clap = { version = "4", features = ["derive", "env"], optional = true }
dotenvy = { version = "0.15", optional = true }

[features]
default = []
cli = ["clap", "dotenvy"]

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
google-cloud-spanner = "0.12"
google-cloud-googleapis = { version = "0.6.0", features = ["spanner"] }
async-trait = "0.1"
serial_test = "3.3"
